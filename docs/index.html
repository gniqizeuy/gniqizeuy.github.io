    function buildColGroup(view) {
      const admin = document.body.classList.contains('admin-active') && view !== 'all';
      const widths = admin
        ? ['calc((100% - 84px) / 3)', 'calc((100% - 84px) / 3)', 'calc((100% - 84px) / 3)', '84px']
        : ['33.3333%', '33.3333%', '33.3334%'];
      const cols = widths.map(width => `<col style="width:${width}">`);
      return cols.join('');
    }
    function buildHead(view) {
      const { columns } = viewConfig[view];
      const sort = viewState[view];
      const headers = columns.map((column, index) => {
        if (!column.type) return `<th class="${column.className || ''}">${column.label}</th>`;
        const ascActive = sort.sortKey === column.key && sort.order === 'asc';
        const descActive = sort.sortKey === column.key && sort.order === 'desc';
        return `<th class="${column.className || ''}"><span class="sort-header"><span class="sort-label">${column.label}</span><span class="sort-arrows"><button type="button" class="sort-arrow ${ascActive ? 'active' : ''}" data-key="${column.key}" data-type="${column.type}" data-order="asc" aria-pressed="${ascActive}" aria-label="${column.label} ascending" onclick="sortActiveView('${column.key}', '${column.type}', 'asc', this)">▲</button><button type="button" class="sort-arrow ${descActive ? 'active' : ''}" data-key="${column.key}" data-type="${column.type}" data-order="desc" aria-pressed="${descActive}" aria-label="${column.label} descending" onclick="sortActiveView('${column.key}', '${column.type}', 'desc', this)">▼</button></span></span></th>`;
      });
      if (document.body.classList.contains('admin-active') && view !== 'all') headers.push('<th class="admin-col">Act</th>');
      return `<tr>${headers.join('')}</tr>`;
    }
    function buildBody(view) {
      const rows = getSortedRows(view);
      const admin = document.body.classList.contains('admin-active') && view !== 'all';
      const colCount = admin ? 4 : 3;
      if (!rows.length) return `<tr><td class="empty-state" colspan="${colCount}">No matching rows</td></tr>`;
      return rows.map((row, index) => {
        const cells = [];
        if (view === 'gf') {
          cells.push(renderCell(row.name, '', admin, index, 'name'));
          cells.push(renderCell(row.pl, 'editable-val num-cell', admin, index, 'pl'));
          cells.push(renderCell(row.roi, 'num-cell', admin, index, 'roi'));
        } else if (view === 'yh') {
          cells.push(renderCell(row.name, '', admin, index, 'name'));
          cells.push(renderCell(row.pl, 'editable-val num-cell', admin, index, 'pl'));
          cells.push(renderCell(row.roi, 'num-cell', admin, index, 'roi'));
        } else {
          cells.push(`<td>${escapeHtml(row.name)}</td>`);
          cells.push(`<td class="amount-value num-cell">${escapeHtml(row.net)}</td>`);
          cells.push(`<td class="src-cell"><span class="src-badge">${escapeHtml(row.src)}</span></td>`);
        }
        if (admin) cells.push(`<td class="admin-col"><button type="button" class="row-action" onclick="deleteRow(${index})">Del</button></td>`);
        return `<tr>${cells.join('')}</tr>`;
      }).join('');
    }
    function renderCell(value, className, editable, rowIndex, field) {
      const safe = escapeHtml(value ?? '');
      if (!editable) return `<td class="${className}">${safe}</td>`;
      return `<td class="${className}" contenteditable="true" onblur="updateCell(${rowIndex}, '${field}', this.textContent)">${safe}</td>`;
    }
    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function getSortedRows(view) {
      const rows = [...getFilteredRows(view)];
      const { sortKey, type, order } = viewState[view];
      rows.sort((a, b) => {
        const av = getValueForSort(a[sortKey], type);
        const bv = getValueForSort(b[sortKey], type);
        if (av !== bv) return order === 'desc' ? bv - av : av - bv;
        return (a.name || '').localeCompare(b.name || '', 'zh-Hans-CN');
      });
      return rows;
    }
    function getValueForSort(value, type) {
      const parsed = parseNumericValue(value);
      if (type === 'amount') return parsed < 0 ? Math.abs(parsed) : parsed;
      return parsed;
    }
    function renderView() {
      const rows = getFilteredRows(activeView);
      const totalRows = getRows(activeView).length;
      const table = document.getElementById('data-table');
      const admin = document.body.classList.contains('admin-active') && activeView !== 'all';
      document.getElementById('panel-title').textContent = viewConfig[activeView].title;
      document.getElementById('panel-meta').innerHTML = `<span>${nameFilter ? `${rows.length} / ${totalRows} rows` : `${rows.length} rows`}</span><strong>${getTotalValue(activeView, true).toFixed(2)}</strong>`;
      document.getElementById('table-cols').innerHTML = buildColGroup(activeView);
      document.getElementById('table-head').innerHTML = buildHead(activeView);
      document.getElementById('table-body').innerHTML = buildBody(activeView);
      table.classList.toggle('admin-mode', admin);
      const addBtn = document.querySelector('.btn-primary');
      addBtn.disabled = activeView === 'all';
      addBtn.classList.toggle('is-disabled', activeView === 'all');
      syncFilterUi();
      updateOverview();
    }
    function resetTableScroll() {
      const shell = document.querySelector('.table-shell');
      if (!shell) return;
      shell.scrollTop = 0;
      shell.scrollLeft = 0;
    }
    function setView(view, button) {
      activeView = view;
      document.querySelectorAll('.tab-label').forEach(el => el.classList.toggle('active', el === button));
      renderView();
      resetTableScroll();
    }
    function sortActiveView(sortKey, type, order) {
      viewState[activeView] = { sortKey, type, order };
      renderView();
      resetTableScroll();
    }
    function syncFilterUi() {
      const input = document.getElementById('name-filter');
      const clear = document.getElementById('name-filter-clear');
      if (!input || !clear) return;
      input.value = nameFilter;
      input.placeholder = 'Search stock';
      clear.hidden = !nameFilter.trim();
    }
    function handleFilterInput(value) {
      nameFilter = value;
      renderView();
      resetTableScroll();
    }
    function clearFilter() {
      nameFilter = '';
      renderView();
      resetTableScroll();
      const input = document.getElementById('name-filter');
      if (input) input.focus();
    }
    function deleteRow(rowIndex) {
      if (!confirm('Delete row?') || activeView === 'all') return;
      const rows = getSortedRows(activeView);
      const target = rows[rowIndex];
      const dataset = datasets[activeView];
      const sourceIndex = dataset.indexOf(target);
      if (sourceIndex >= 0) dataset.splice(sourceIndex, 1);
      renderView();
      resetTableScroll();
    }
    function addRowToActive() {
      if (activeView === 'all') return;
      addRow(activeView);
    }
    function addRow(view) {
      const row = view === 'yh'
        ? { name: 'New', pl: '0.00', roi: '0.00%', move: '0.00%' }
        : { name: 'New', pl: '0.00', roi: '0.00%' };
      datasets[view].push(row);
      renderView();
      resetTableScroll();
    }
    function updateCell(rowIndex, field, value) {
      if (activeView === 'all') return;
      const rows = getSortedRows(activeView);
      const target = rows[rowIndex];
      const dataset = datasets[activeView];
      const sourceIndex = dataset.indexOf(target);
      if (sourceIndex < 0) return;
      dataset[sourceIndex][field] = value.trim();
      renderView();
      resetTableScroll();
    }
    function normalizeNumericText(text) {
      const raw = (text || '').replace(/,/g, '').replace(/%/g, '').replace(/\s+/g, '');
      const sign = raw.startsWith('-') ? '-' : '';
      let body = raw.replace(/^[+-]/, '');
      const parts = body.split('.');
      if (parts.length > 1) body = `${parts[0]}.${parts.slice(1).join('')}`;
      return `${sign}${body}`;
    }
    function parseNumericValue(text) {
      const value = Number.parseFloat(normalizeNumericText(text));
      return Number.isFinite(value) ? value : 0;
    }
    const O = 'gniqizeuy'; const R = 'gniqizeuy.github.io';
    async function handleSync() {
      const t = document.getElementById('gh-token').value; if (!t) return;
      localStorage.setItem('gh_token', t); const s = document.getElementById('save-status'); s.textContent = 'Syncing...';
      closeModal('save-modal');
      try { await sf('assets/data/gf_losses.csv', 'gf', t); await sf('assets/data/yh_losses.csv', 'yh', t); s.textContent = 'Synced'; } catch (e) { s.textContent = 'Failed'; }
    }
    async function sf(p, view, t) {
      let h = p.includes('gf') ? ['股票名称', '盈亏金额', '收益率'] : ['股票名称', '盈亏金额', '收益率', '区间涨幅'];
      let csv = h.join(',') + '\n';
      const rows = datasets[view];
      rows.forEach(row => {
        const data = p.includes('gf')
          ? [row.name || '', row.pl || '', row.roi || '']
          : [row.name || '', row.pl || '', row.roi || '', row.move || ''];
        csv += data.map(item => String(item).trim()).join(',') + '\n';
      });
      const api_h = { 'Authorization': `Bearer ${t}`, 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' };
      const get = await fetch(`https://api.github.com/repos/${O}/${R}/contents/${p}`, { headers: api_h });
      const { sha } = await get.json();
      await fetch(`https://api.github.com/repos/${O}/${R}/contents/${p}`, {
        method: 'PUT', headers: { ...api_h, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: `Update: ${p}`, content: btoa(unescape(encodeURIComponent(csv))), sha })
      });
    }
    renderView();
  </script>
</body>
</html>
