        const existing = srcs.get(key);
        srcs.set(key, existing && existing !== 'YH' ? 'GF+YH' : 'YH');
        if (!codes.get(key) && isMarketSymbol(row.code)) codes.set(key, row.code);
        mergeRowTags(tags, key, row);
      });
      return Array.from(totals.entries()).map(([name, net]) => ({
        code: codes.get(name) || '',
        name,
        net: net.toFixed(2),
        src: srcs.get(name) || '',
        tags: tags.get(name) || [],
      }));
    }
    function getRows(view) {
      return view === 'all' ? getSummaryRows() : datasets[view];
    }
    function getFilteredRows(view) {
      const keyword = nameFilter.trim().toLocaleLowerCase();
      const hasTagFilter = selectedTags.size > 0;
      const rows = getRows(view);
      if (!keyword && !hasTagFilter) return rows;
      return rows.filter(row => {
        const matchesKeyword = !keyword || (row.name || '').toLocaleLowerCase().includes(keyword);
        const matchesTags = !hasTagFilter || getRowTags(row).some(tag => selectedTags.has(tag));
        return matchesKeyword && matchesTags;
      });
    }
    function getTotalValue(view, filtered = false) {
      const rows = filtered ? getFilteredRows(view) : getRows(view);
      return rows.reduce((sum, row) => {
        const key = view === 'all' ? 'net' : 'pl';
        return sum + parseNumericValue(row[key]);
      }, 0);
    }
    function getWorstName() {
      const rows = [...datasets.gf, ...datasets.yh];
      let worstName = '';
      let worstValue = Infinity;
      rows.forEach(row => {
        const value = parseNumericValue(row.pl);
        if (row.name && value < worstValue) {
          worstValue = value;
          worstName = row.name;
        }
      });
      return worstName || 'N/A';
    }
    function updateOverview() {
      const chips = document.querySelectorAll('.overview-chip strong');
      if (chips[0]) chips[0].textContent = datasets.gf.length;
      if (chips[1]) chips[1].textContent = datasets.yh.length;
      const names = new Set([...datasets.gf.map(row => row.name?.trim()), ...datasets.yh.map(row => row.name?.trim())].filter(Boolean));
      if (chips[2]) chips[2].textContent = names.size;
      if (chips[3]) chips[3].textContent = getTotalValue('all').toFixed(2);
      const worst = document.querySelector('.brand-pill span');
      if (worst) worst.textContent = `Worst ${getWorstName()}`;
    }
    function createNormalizedSymbolMap(source) {
      return Object.entries(source).reduce((acc, [name, symbol]) => {
        const normalized = normalizeStockName(name);
        if (normalized && isMarketSymbol(symbol)) acc[normalized] = symbol;
        return acc;
      }, {});
    }
    function loadSymbolCache() {
      const cache = new Map(Object.entries(symbolOverrides));
      try {
        const raw = localStorage.getItem(symbolCacheKey);
        if (!raw) return cache;
        const parsed = JSON.parse(raw);
        Object.entries(parsed || {}).forEach(([name, symbol]) => {
          if (name && isMarketSymbol(symbol)) cache.set(name, symbol);
        });
      } catch (error) {}
      return cache;
    }
    function persistSymbolCache() {
      try {
        localStorage.setItem(symbolCacheKey, JSON.stringify(Object.fromEntries(symbolCache)));
      } catch (error) {}
    }
    function normalizeStockName(name) {
      return String(name || '').trim().replace(/\s+/g, '').toUpperCase();
    }
    function isMarketSymbol(symbol) {
      return /^(sh|sz|bj)\d{6}$/i.test(symbol || '');
    }
    function getCachedSymbol(stockName) {
      return symbolCache.get(normalizeStockName(stockName)) || '';
    }
    function getKLineImageUrl(symbol) {
      return `https://image.sinajs.cn/newchart/daily/n/${encodeURIComponent(symbol)}.gif`;
    }
    function parseSuggestEntries(raw) {
      return String(raw || '')
        .split(';')
        .map(item => item.trim())
        .filter(Boolean)
        .map(item => {
          const fields = item.split(',');
          return {
            name: fields[0] || '',
            type: fields[1] || '',
            code: fields[2] || '',
            symbol: fields[3] || '',
            altName: fields[4] || '',
          };
        });
    }
    function matchesSuggestEntry(entry, stockName) {
      const target = normalizeStockName(stockName);
      return [entry.name, entry.altName].some(candidate => {
        const normalized = normalizeStockName(candidate);
        return normalized && (normalized === target || normalized.includes(target) || target.includes(normalized));
      });
    }
    function pickSymbolFromSuggest(raw, stockName) {
      const entries = parseSuggestEntries(raw).filter(entry => isMarketSymbol(entry.symbol));
      const exact = entries.find(entry => matchesSuggestEntry(entry, stockName));
      return exact ? exact.symbol : '';
    }
    function loadSuggestValue(stockName) {
      const name = String(stockName || '').trim();
      if (!name) return Promise.resolve('');
      suggestLookupQueue = suggestLookupQueue.then(() => new Promise(resolve => {
        const script = document.createElement('script');
        const cleanup = () => {
          script.remove();
          window.suggestvalue = '';
        };
        let settled = false;
        const finish = value => {
          if (settled) return;
          settled = true;
          window.clearTimeout(timeoutId);
          cleanup();
          resolve(typeof value === 'string' ? value : '');
        };
        const timeoutId = window.setTimeout(() => finish(''), 6000);
        window.suggestvalue = '';
        script.async = true;
        script.charset = 'gbk';
        script.src = `https://suggest3.sinajs.cn/suggest/key=${encodeURIComponent(name)}&_=${Date.now()}`;
        script.onload = () => finish(window.suggestvalue);
        script.onerror = () => finish('');
        document.head.appendChild(script);
      }));
      return suggestLookupQueue;
    }
    function getSymbolForStock(stockName) {
      const normalized = normalizeStockName(stockName);
      if (!normalized) return Promise.resolve('');
      const cached = symbolCache.get(normalized);
      if (cached) return Promise.resolve(cached);
      if (symbolLookupCache.has(normalized)) return symbolLookupCache.get(normalized);
      const lookup = loadSuggestValue(stockName)
        .then(raw => {
          const symbol = pickSymbolFromSuggest(raw, stockName);
          if (symbol) {
            symbolCache.set(normalized, symbol);
            persistSymbolCache();
          }
          symbolLookupCache.delete(normalized);
          return symbol;
        })
        .catch(() => {
          symbolLookupCache.delete(normalized);
          return '';
      });
      symbolLookupCache.set(normalized, lookup);
      return lookup;
    }
    function getSymbolForRow(row) {
      const direct = row?.code || '';
      if (isMarketSymbol(direct)) return Promise.resolve(direct);
      return getSymbolForStock(row?.name || '');
    }
    function getSelectedStockName(view) {
      return selectedStockByView[view] || '';
    }
    function setSelectedStock(view, stockName) {
      selectedStockByView[view] = stockName || '';
    }
    function getPreviewBadge(view, row) {
      if (!row) return '';
      return view === 'all' ? (row.src || 'ALL') : view.toUpperCase();
    }
    function renderPreviewEmpty(title, message, badge) {
      setChartHeader(title, badge ? `<span class="chart-panel-badge">${escapeHtml(badge)}</span>` : '');
      const stage = document.getElementById('chart-stage');
      stage.classList.remove('is-loading');
      stage.innerHTML = `<div class="chart-empty"><strong>${escapeHtml(title)}</strong><span>${escapeHtml(message)}</span></div>`;
    }
    function renderPreviewLoading(view, row) {
      setChartHeader(row?.name || 'Loading', [
        `<span class="chart-panel-badge">${escapeHtml(getPreviewBadge(view, row))}</span>`,
        '<span>Loading</span>',
      ].join(''));
      const stage = document.getElementById('chart-stage');
      stage.classList.add('is-loading');
      stage.innerHTML = `<div class="chart-empty"><strong>Loading</strong><span>正在加载 ${escapeHtml(row?.name || '')} 的预览。</span></div>`;
    }
    function renderPreviewChart(view, row, symbol) {
      setChartHeader(row?.name || 'N/A', [
        `<span class="chart-panel-badge">${escapeHtml(getPreviewBadge(view, row))}</span>`,
        `<span>${escapeHtml(symbol.toUpperCase())}</span>`,
      ].join(''));
      const stage = document.getElementById('chart-stage');
      stage.classList.remove('is-loading');
      stage.innerHTML = `<img src="${getKLineImageUrl(symbol)}" alt="${escapeHtml(row?.name || '')} preview" loading="eager" referrerpolicy="no-referrer" onerror="handlePreviewError()">`;
    }
    function ensureSelectedRow(view, rows) {
      const current = getSelectedStockName(view);
      const hasCurrent = rows.some(row => (row.name || '') === current);
      const next = hasCurrent ? current : (rows[0]?.name || '');
      setSelectedStock(view, next);
      return next;
    }
    function updatePreviewPanel() {
      const rows = getSortedRows(activeView);
      const selectedName = ensureSelectedRow(activeView, rows);
      const selectedRow = rows.find(row => (row.name || '') === selectedName);
      const requestId = ++previewRequestId;
      if (!selectedRow) {
        renderPreviewEmpty('No Selection', '当前列表里没有可预览的股票。', activeView.toUpperCase());
        return;
      }
      renderPreviewLoading(activeView, selectedRow);
      getSymbolForRow(selectedRow).then(symbol => {
        if (requestId !== previewRequestId) return;
        if (!symbol) {
          renderPreviewEmpty(selectedRow.name || 'No Chart', '暂时找不到这支股票的证券代码，无法加载预览。', getPreviewBadge(activeView, selectedRow));
          return;
        }
        renderPreviewChart(activeView, selectedRow, symbol);
      });
    }
    function handlePreviewError() {
      const rows = getSortedRows(activeView);
      const selectedName = getSelectedStockName(activeView);
      const selectedRow = rows.find(row => (row.name || '') === selectedName);
      renderPreviewEmpty(selectedRow?.name || 'No Chart', '图源返回失败，稍后再试或切换另一只股票。', getPreviewBadge(activeView, selectedRow));
    }
    function selectStock(stockName) {
      setSelectedStock(activeView, stockName);
      renderView();
    }
    function buildColGroup(view) {
      const valueRatios = view === 'all' ? [0.48, 0.24, 0.28] : [0.46, 0.31, 0.23];
      const widths = valueRatios.map(ratio => `${ratio * 100}%`);
      const cols = widths.map(width => `<col style="width:${width}">`);
      return cols.join('');
    }
    function buildHead(view) {
      const { columns } = viewConfig[view];
      const sort = viewState[view];
      const headers = columns.map((column, index) => {
        if (!column.type) return `<th class="${column.className || ''}">${column.label}</th>`;
        const ascActive = sort.sortKey === column.key && sort.order === 'asc';
        const descActive = sort.sortKey === column.key && sort.order === 'desc';
        return `<th class="${column.className || ''}"><span class="sort-header"><span class="sort-label">${column.label}</span><span class="sort-arrows"><button type="button" class="sort-arrow ${ascActive ? 'active' : ''}" data-key="${column.key}" data-type="${column.type}" data-order="asc" aria-pressed="${ascActive}" aria-label="${column.label} ascending" onclick="sortActiveView('${column.key}', '${column.type}', 'asc', this)">▲</button><button type="button" class="sort-arrow ${descActive ? 'active' : ''}" data-key="${column.key}" data-type="${column.type}" data-order="desc" aria-pressed="${descActive}" aria-label="${column.label} descending" onclick="sortActiveView('${column.key}', '${column.type}', 'desc', this)">▼</button></span></span></th>`;
      });
      return `<tr>${headers.join('')}</tr>`;
    }
    function buildBody(view) {
      const rows = getSortedRows(view);
      const colCount = viewConfig[view].columns.length;
      if (!rows.length) return `<tr><td class="empty-state" colspan="${colCount}">No matching rows</td></tr>`;
      const selectedName = ensureSelectedRow(view, rows);
      return rows.map((row, index) => {
        const cells = [];
        if (view === 'gf') {
          cells.push(renderNameCell(row));
          cells.push(renderCell(row.pl, 'amount-value num-cell'));
          cells.push(renderCell(row.roi, 'num-cell'));
        } else if (view === 'yh') {
          cells.push(renderNameCell(row));
          cells.push(renderCell(row.pl, 'amount-value num-cell'));
          cells.push(renderCell(row.roi, 'num-cell'));
        } else {
          cells.push(renderNameCell(row));
          cells.push(`<td class="amount-value num-cell">${escapeHtml(row.net)}</td>`);
          cells.push(`<td class="src-cell"><span class="src-badge">${escapeHtml(row.src)}</span></td>`);
        }
        const selectedClass = row.name === selectedName ? 'is-selected' : '';
        return `<tr class="is-row-selectable ${selectedClass}" onclick='selectStock(${JSON.stringify(row.name || "")})'>${cells.join('')}</tr>`;
      }).join('');
    }
    function renderCell(value, className) {
      const safe = escapeHtml(value ?? '');
      return `<td class="${className}">${safe}</td>`;
    }
    function renderNameCell(row) {
      return `<td class="stock-cell"><span class="stock-name">${escapeHtml(row?.name || '')}</span></td>`;
    }
    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function getSortedRows(view) {
      const rows = [...getFilteredRows(view)];
      const { sortKey, type, order } = viewState[view];
      rows.sort((a, b) => {
        const av = getValueForSort(a[sortKey], type);
        const bv = getValueForSort(b[sortKey], type);
        if (av !== bv) return order === 'desc' ? bv - av : av - bv;
        return (a.name || '').localeCompare(b.name || '', 'zh-Hans-CN');
      });
      return rows;
    }
    function getValueForSort(value, type) {
      const parsed = parseNumericValue(value);
      if (type === 'amount') return parsed < 0 ? Math.abs(parsed) : parsed;
      return parsed;
    }
    function getAvailableTags(view) {
      const stats = new Map();
      const valueKey = view === 'all' ? 'net' : 'pl';
      getRows(view).forEach(row => {
        const loss = Math.max(0, -parseNumericValue(row[valueKey]));
        getRowTags(row).forEach(tag => {
          const current = stats.get(tag) || { tag, count: 0, loss: 0 };
          current.count += 1;
          current.loss += loss;
          stats.set(tag, current);
        });
      });
      return Array.from(stats.values())
        .sort((a, b) => (b.loss - a.loss) || (b.count - a.count) || a.tag.localeCompare(b.tag, 'zh-Hans-CN'));
    }
    function pruneSelectedTags(view) {
      const available = new Set(getAvailableTags(view).map(item => item.tag));
      selectedTags.forEach(tag => {
        if (!available.has(tag)) selectedTags.delete(tag);
      });
    }
    function renderTagFilter() {
      const box = document.getElementById('tag-filter');
      const count = document.getElementById('tag-filter-count');
      const tags = getAvailableTags(activeView);
      if (count) count.textContent = tags.length;
      box.classList.toggle('has-tags', tags.length > 0);
      if (!tags.length) {
        box.innerHTML = '';
        return;
      }
      const allActive = selectedTags.size === 0;
      const allChip = `<button type="button" class="tag-chip ${allActive ? 'is-active' : ''}" data-tag="">全部标签</button>`;
      const tagChips = tags.map(({ tag, count }) => {
        const active = selectedTags.has(tag);
        return `<button type="button" class="tag-chip ${active ? 'is-active' : ''}" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)} ${count}</button>`;
      }).join('');
      box.innerHTML = allChip + tagChips;
    }
    function toggleTagFilter(tag) {
      if (!tag) {
        selectedTags.clear();
      } else if (selectedTags.has(tag)) {
        selectedTags.delete(tag);
      } else {
        selectedTags.add(tag);
      }
      renderView();
      resetTableScroll();
    }
    function renderView() {
      pruneSelectedTags(activeView);
      const rows = getFilteredRows(activeView);
      const totalRows = getRows(activeView).length;
      const hasFilter = Boolean(nameFilter.trim()) || selectedTags.size > 0;
      document.getElementById('panel-title').textContent = viewConfig[activeView].title;
      document.getElementById('panel-meta').innerHTML = `<span>${hasFilter ? `${rows.length} / ${totalRows} rows` : `${rows.length} rows`}</span><strong>${getTotalValue(activeView, true).toFixed(2)}</strong>`;
      document.getElementById('table-cols').innerHTML = buildColGroup(activeView);
      document.getElementById('table-head').innerHTML = buildHead(activeView);
      document.getElementById('table-body').innerHTML = buildBody(activeView);
      renderTagFilter();
      updatePreviewPanel();
      syncFilterUi();
      updateOverview();
    }
    function resetTableScroll() {
      const shell = document.querySelector('.table-shell');
      if (!shell) return;
      shell.scrollTop = 0;
      shell.scrollLeft = 0;
    }
    function setView(view, button) {
      activeView = view;
      document.querySelectorAll('.tab-label').forEach(el => el.classList.toggle('active', el === button));
      renderView();
      resetTableScroll();
    }
    function sortActiveView(sortKey, type, order) {
      viewState[activeView] = { sortKey, type, order };
      renderView();
      resetTableScroll();
    }
    function syncFilterUi() {
      const input = document.getElementById('name-filter');
      const clear = document.getElementById('name-filter-clear');
      if (!input || !clear) return;
      input.value = nameFilter;
      input.placeholder = 'Search stock';
      clear.hidden = !nameFilter.trim();
    }
    function handleFilterInput(value) {
      nameFilter = value;
      renderView();
      resetTableScroll();
    }
    function clearFilter() {
      nameFilter = '';
      renderView();
      resetTableScroll();
      const input = document.getElementById('name-filter');
      if (input) input.focus();
    }
    function normalizeNumericText(text) {
      const raw = (text || '').replace(/,/g, '').replace(/%/g, '').replace(/\s+/g, '');
      const sign = raw.startsWith('-') ? '-' : '';
      let body = raw.replace(/^[+-]/, '');
      const parts = body.split('.');
      if (parts.length > 1) body = `${parts[0]}.${parts.slice(1).join('')}`;
      return `${sign}${body}`;
    }
    function parseNumericValue(text) {
      const value = Number.parseFloat(normalizeNumericText(text));
      return Number.isFinite(value) ? value : 0;
    }
    renderView();
  </script>
</body>
</html>
